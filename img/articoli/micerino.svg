<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Confronto tra parte alta e parte bassa delle due figure: nel faraone la parte alta e simmetrica e la bassa ancorata, nella consorte entrambe sono definite">
  <title>Sopra e sotto</title>
  <rect width="1200" height="560" fill="#ECE7DB"/>
  <text x="330" y="52" fill="#8A8578" font-family="monospace" font-size="17" text-anchor="middle" letter-spacing="3">IL FARAONE</text>
  <line x1="180" y1="286" x2="480" y2="286" stroke="#D2CBBA" stroke-width="1.6" stroke-dasharray="5 6"/>
  <text x="172" y="182" fill="#8A8578" font-family="monospace" font-size="13" text-anchor="end" letter-spacing="2">SOPRA</text>
  <text x="172" y="382" fill="#8A8578" font-family="monospace" font-size="13" text-anchor="end" letter-spacing="2">SOTTO</text>
  <circle cx="268" cy="160" r="20" fill="#D98A2B"/>
  <circle cx="392" cy="160" r="20" fill="#D98A2B"/>
  <circle cx="330" cy="160" r="30" fill="none" stroke="#16150F" stroke-width="2.4" stroke-dasharray="6 7"/>
  <circle cx="330" cy="160" r="7" fill="#16150F"/>
  <text x="330" y="238" fill="#16150F" font-family="serif" font-size="21" text-anchor="middle">posso andare ovunque</text>
  <ellipse cx="284" cy="336" rx="17" ry="30" fill="#D98A2B" transform="rotate(-6 284 336)"/>
  <ellipse cx="376" cy="426" rx="17" ry="30" fill="#D98A2B" transform="rotate(4 376 426)"/>
  <text x="330" y="500" fill="#16150F" font-family="serif" font-size="21" text-anchor="middle">non vado da nessuna parte</text>
  <line x1="600" y1="40" x2="600" y2="520" stroke="#D2CBBA" stroke-width="2"/>
  <text x="870" y="52" fill="#8A8578" font-family="monospace" font-size="17" text-anchor="middle" letter-spacing="3">LA CONSORTE</text>
  <line x1="720" y1="286" x2="1020" y2="286" stroke="#D2CBBA" stroke-width="1.6" stroke-dasharray="5 6"/>
  <text x="712" y="182" fill="#8A8578" font-family="monospace" font-size="13" text-anchor="end" letter-spacing="2">SOPRA</text>
  <text x="712" y="382" fill="#8A8578" font-family="monospace" font-size="13" text-anchor="end" letter-spacing="2">SOTTO</text>
  <circle cx="808" cy="180" r="20" fill="#5E9C86"/>
  <circle cx="932" cy="140" r="14" fill="#5E9C86" opacity=".45"/>
  <path d="M814 168 C860 140, 890 132, 920 138" fill="none" stroke="#5E9C86" stroke-width="4"/>
  <path d="M830 205 L910 172" stroke="#5E9C86" stroke-width="3" stroke-dasharray="7 6"/>
  <text x="870" y="238" fill="#16150F" font-family="serif" font-size="21" text-anchor="middle">una posizione sola</text>
  <ellipse cx="838" cy="356" rx="17" ry="30" fill="#5E9C86" transform="rotate(-3 838 356)"/>
  <ellipse cx="902" cy="400" rx="17" ry="30" fill="#5E9C86" transform="rotate(3 902 400)"/>
  <text x="870" y="500" fill="#16150F" font-family="serif" font-size="21" text-anchor="middle">connessa, non reversibile</text>
</svg>